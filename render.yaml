services:
  - type: web
    name: lead-generation-backend
    runtime: python
    repo: https://github.com/Fatekindia05/lead-generation-system
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
    buildCommand: |
      cd backend
      chmod +x render-build.sh
      ./render-build.sh
    startCommand: |
      cd backend
      uvicorn main:app --host 0.0.0.0 --port $PORT