version: '3.8'

services:
  backend:
    build: ./backend
    container_name: lead-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend:/app
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lead-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped